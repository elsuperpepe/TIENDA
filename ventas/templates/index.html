<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Mi Negocio - Xbox & Papelería</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <style>
            #mic-btn.escuchando {
                background-color: #dc3545;
                animation: pulse 1s infinite;
            }
            @keyframes pulse {
                0% {
                    box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
                }
                70% {
                    box-shadow: 0 0 0 15px rgba(220, 53, 69, 0);
                }
                100% {
                    box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
                }
            }
        </style>
    </head>
    <body class="container py-4">
        <h1 class="mb-4">🎮 Xbox & 📎 Papelería</h1>

        <!-- Zona de voz -->
        <div class="card mb-4 p-3 bg-light">
            <h3>🎤 Comando de voz</h3>
            <button
                id="mic-btn"
                class="btn btn-primary btn-lg"
                onclick="toggleMicrofono()"
            >
                🎙️ Hablar
            </button>
            <span id="estado-voz" class="ms-2"
                >Pulsa y habla (ej: "dos horas de xbox")</span
            >
            <div id="transcripcion" class="mt-2 fst-italic"></div>
        </div>

        <!-- Lista de productos -->
        <h2>Productos disponibles</h2>
        <div id="lista-productos" class="row mb-4"></div>

        <!-- Carrito -->
        <h2>Carrito</h2>
        <ul id="carrito-lista" class="list-group mb-3"></ul>
        <button class="btn btn-success btn-lg" onclick="realizarVenta()">
            Finalizar Venta
        </button>

        <!-- Ventas realizadas -->
        <h2 class="mt-5">Historial de Ventas</h2>
        <div id="lista-ventas"></div>

        <script>
            // ========== MICROFONO ==========
            let recognition;
            let escuchando = false;

            function initRecognition() {
                const SpeechRecognition =
                    window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert(
                        "Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.",
                    );
                    return null;
                }
                const rec = new SpeechRecognition();
                rec.lang = "es-CO"; // español colombiano
                rec.continuous = false; // una sola frase
                rec.interimResults = false;
                return rec;
            }

            function toggleMicrofono() {
                if (!recognition) {
                    recognition = initRecognition();
                    if (!recognition) return;
                    recognition.onresult = (event) => {
                        const texto = event.results[0][0].transcript.trim();
                        document.getElementById("transcripcion").textContent =
                            '"' + texto + '"';
                        document.getElementById("estado-voz").textContent =
                            "Procesando...";
                        enviarVoz(texto);
                    };
                    recognition.onerror = (event) => {
                        document.getElementById("estado-voz").textContent =
                            "Error: " + event.error;
                        detenerEscucha();
                    };
                    recognition.onend = () => {
                        detenerEscucha();
                    };
                }

                if (escuchando) {
                    recognition.stop();
                    detenerEscucha();
                } else {
                    recognition.start();
                    document
                        .getElementById("mic-btn")
                        .classList.add("escuchando");
                    document.getElementById("mic-btn").textContent =
                        "🔴 Escuchando...";
                    document.getElementById("estado-voz").textContent =
                        "Habla ahora...";
                    escuchando = true;
                }
            }

            function detenerEscucha() {
                document
                    .getElementById("mic-btn")
                    .classList.remove("escuchando");
                document.getElementById("mic-btn").textContent = "🎙️ Hablar";
                document.getElementById("estado-voz").textContent =
                    "Pulsa y habla (ej: 'dos horas de xbox')";
                escuchando = false;
            }

            function enviarVoz(texto) {
                fetch("/api/voz/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCSRFToken(),
                    },
                    body: JSON.stringify({ texto: texto, tienda_id: 1 }),
                })
                    .then((r) => r.json())
                    .then((data) => {
                        if (data.error) {
                            alert("Error: " + data.error);
                            document.getElementById("estado-voz").textContent =
                                "Error: " + data.error;
                        } else {
                            alert(
                                `¡Venta #${data.venta_id} por voz! Total: $${data.total}`,
                            );
                            document.getElementById("estado-voz").textContent =
                                "Venta registrada. Pulsa para otra.";
                            cargarVentas();
                            location.reload(); // refresca productos para ver stock
                        }
                    })
                    .catch((err) => {
                        console.error(err);
                        document.getElementById("estado-voz").textContent =
                            "Error de conexión";
                    });
            }

            // ========== TOKEN CSRF ==========
            function getCSRFToken() {
                let cookieValue = null;
                if (document.cookie && document.cookie !== "") {
                    const cookies = document.cookie.split(";");
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, 10) === "csrftoken=") {
                            cookieValue = decodeURIComponent(
                                cookie.substring(10),
                            );
                            break;
                        }
                    }
                }
                return cookieValue;
            }

            // ========== CARGAR PRODUCTOS ==========
            fetch("/api/inventario/productos/")
                .then((res) => res.json())
                .then((data) => {
                    const div = document.getElementById("lista-productos");
                    data.forEach((p) => {
                        div.innerHTML += `
                        <div class="col-md-4 mb-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">${p.nombre}</h5>
                                    <p class="card-text">Precio: $${p.precio}</p>
                                    <div class="input-group mb-2">
                                        <input type="number" id="cant-${p.id}" class="form-control" value="1" min="1">
                                        <button class="btn btn-primary" onclick="agregar(${p.id})">Agregar</button>
                                    </div>
                                    ${p.es_servicio ? '<span class="badge bg-info">Servicio (sin stock)</span>' : `<span class="badge bg-secondary">Stock: ${p.stock}</span>`}
                                </div>
                            </div>
                        </div>`;
                    });
                });

            // ========== CARRITO ==========
            let carrito = [];

            function agregar(productoId) {
                const cantidad = parseInt(
                    document.getElementById(`cant-${productoId}`).value,
                );
                if (cantidad < 1) return;
                carrito.push({ producto_id: productoId, cantidad: cantidad });
                actualizarCarritoUI();
            }

            function actualizarCarritoUI() {
                const lista = document.getElementById("carrito-lista");
                lista.innerHTML = "";
                carrito.forEach((item, index) => {
                    lista.innerHTML += `<li class="list-group-item d-flex justify-content-between">
                    Producto #${item.producto_id} x ${item.cantidad}
                    <button class="btn btn-sm btn-danger" onclick="eliminarDelCarrito(${index})">Quitar</button>
                </li>`;
                });
            }

            function eliminarDelCarrito(index) {
                carrito.splice(index, 1);
                actualizarCarritoUI();
            }

            function realizarVenta() {
                if (carrito.length === 0) {
                    alert("Agrega productos al carrito primero");
                    return;
                }
                fetch("/api/registrar/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCSRFToken(),
                    },
                    body: JSON.stringify({ tienda_id: 1, items: carrito }),
                })
                    .then((response) => response.json())
                    .then((data) => {
                        if (data.error) {
                            alert("Error: " + data.error);
                        } else {
                            alert(
                                `¡Venta #${data.venta_id} exitosa! Total: $${data.total}`,
                            );
                            carrito = [];
                            actualizarCarritoUI();
                            cargarVentas();
                            location.reload();
                        }
                    })
                    .catch((err) => {
                        console.error(err);
                        alert("Error de conexión");
                    });
            }

            function cargarVentas() {
                fetch("/api/listar/")
                    .then((res) => res.json())
                    .then((data) => {
                        const div = document.getElementById("lista-ventas");
                        div.innerHTML = `
                        ${data.ventas.map((v) => `<p>Venta #${v.id}: $${v.total}</p>`).join("")}
                        <hr>
                        <h3>Total acumulado: $${data.total_general}</h3>
                    `;
                    });
            }

            cargarVentas();
        </script>
    </body>
</html>
